    <title>Cadastro de Imóvel</title>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">

    <br>
    <form>
        <div style="display:flex; gap:15px; align-items:end; justify-content: center; align-items: center;">
            <div class="form-group">
                <label for="pes_nome">Nome</label>
                <input type="text" class="form-control" id="pes_nome" placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="pes_email">E-mail</label>
                <input type="email" class="form-control" id="pes_email" placeholder="Digite seu e-mail">
            </div>
            <div class="form-group">
                <label for="pes_telefone">Telefone</label>
                <input type="text" class="form-control" id="pes_telefone" placeholder="Digite seu telefone">
            </div>
            <div class="form-group">
                <label for="pes_cpf">CPF</label>
                <input type="text" class="form-control" id="pes_cpf" placeholder="Digite seu CPF">
            </div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </div>
    </form>

    <hr>    

    <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">First</th>
      <th scope="col">Last</th>
      <th scope="col">Handle</th>
    </tr>
  </thead>

    <tr>
